name: Build Hermes Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Hermes-Agent release tag (e.g. v2026.6.19). Leave empty for latest."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(curl -fsSL https://api.github.com/repos/NousResearch/hermes-agent/releases/latest | jq -r '.tag_name')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building from tag: $TAG"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: npm ci --ignore-scripts

      - name: Build Desktop (pack)
        shell: bash
        run: cd apps/desktop && npm run pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-desktop-${{ matrix.platform }}
          path: apps/desktop/release/
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: hermes-desktop-*
          merge-multiple: true

      - name: Compress for Release
        run: |
          cd artifacts
          for dir in */; do
            [ -d "$dir" ] || continue
            name="${dir%/}"
            tar czf "${name}.tar.gz" "$dir"
          done
          ls -lh *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-${{ needs.resolve.outputs.tag }}
          name: "Hermes Desktop — ${{ needs.resolve.outputs.tag }}"
          draft: true
          files: artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
